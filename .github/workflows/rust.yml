name: Rust Release Build

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build Release
      run: cargo build --release --verbose
      
    - name: Prepare Asset
      shell: powershell
      run: |
        $TAG = "${{ github.ref_name }}"
        $VERSION = $TAG.TrimStart('v')
        
        $parts = $VERSION.Split('.')
        $RELEASE_TAG = "v$($parts[0]).$($parts[1])"
        
        $ASSET_NAME = "mvtool-x86_64-pc-windows-msvc.tar"

        if (Test-Path "target/release/mvtool.exe") {
            tar -cvf $ASSET_NAME -C target/release mvtool.exe
        } else {
            Write-Error "mvtool.exe not found!"
            exit 1
        }

        echo "RELEASE_TAG=$RELEASE_TAG" >> $env:GITHUB_ENV
        echo "RELEASE_TITLE=Release $VERSION" >> $env:GITHUB_ENV
        echo "ASSET_NAME=$ASSET_NAME" >> $env:GITHUB_ENV

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: ${{ env.RELEASE_TITLE }}
        files: ${{ env.ASSET_NAME }}
        overwrite: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
