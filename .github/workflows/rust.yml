name: Rust Release Build

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build Release
      run: cargo build --release --verbose
      
    - name: Prepare Asset
      shell: powershell
      run: |
        $TAG = "${{ github.ref_name }}"
        $VERSION = $TAG.TrimStart('v')
        
        $RELEASE_TAG = $TAG
        
        $ASSET_NAME = "mvtool-x86_64-pc-windows-msvc.tar"

        New-Item -ItemType Directory -Force -Path "dist"
        Copy-Item "target/release/mvtool.exe" -Destination "dist/"

        if (Test-Path "res") { Copy-Item -Recurse "res" -Destination "dist/" }
        if (Test-Path "icon.ico") { Copy-Item "icon.ico" -Destination "dist/" }

        tar -cvf $ASSET_NAME -C dist .

        echo "RELEASE_TAG=$RELEASE_TAG" >> $env:GITHUB_ENV
        echo "RELEASE_TITLE=Release $VERSION" >> $env:GITHUB_ENV
        echo "ASSET_NAME=$ASSET_NAME" >> $env:GITHUB_ENV

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_TAG }}
        name: ${{ env.RELEASE_TITLE }}
        files: ${{ env.ASSET_NAME }}
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
